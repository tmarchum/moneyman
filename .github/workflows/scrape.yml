name: Scrape
on:
  workflow_dispatch:
    inputs:
      DEBUG:
        description: "Debug logging namespace"
        required: false
        default: "moneyman:*"
  schedule:
    - cron: "5 10,22 * * *"

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Pull container image
        run: docker pull ghcr.io/daniel-hauser/moneyman:latest

      - name: Prepare output directory
        run: mkdir -p ${{ github.workspace }}/output && chmod 777 ${{ github.workspace }}/output

      - name: Run scraper with localJson + googleSheets
        env:
          MONEYMAN_CONFIG_ORIG: ${{ secrets.MONEYMAN_CONFIG }}
          GSE: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_EMAIL }}
          GSK: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_PRIVATE_KEY }}
          GSI: ${{ secrets.GOOGLE_SHEET_ID }}
          GSW: ${{ secrets.GOOGLE_WORKSHEET_NAME }}
          DEBUG: ${{ github.event.inputs.DEBUG || 'moneyman:*' }}
          TZ: "Asia/Jerusalem"
          MONEYMAN_UNSAFE_STDOUT: "true"
        run: |
          GSK_FIXED=$(printf '%s' "$GSK" | sed 's/\\n/\n/g')
          MERGED_CONFIG=$(echo "$MONEYMAN_CONFIG_ORIG" | jq \
            --arg email "$GSE" \
            --arg key "$GSK_FIXED" \
            --arg sheet "$GSI" \
            --arg ws "$GSW" \
            '(.storage //= {})
             | .storage.googleSheets = {serviceAccountEmail: $email, serviceAccountPrivateKey: $key, sheetId: $sheet, worksheetName: $ws}
             | .storage.localJson = {enabled: true, path: "/output"}
             | (.options //= {}) | (.options.scraping //= {})
             | .options.scraping.daysBack = 30')
          docker run --rm \
            -v ${{ github.workspace }}/output:/output \
            -e MONEYMAN_CONFIG="$MERGED_CONFIG" \
            -e DEBUG \
            -e TZ \
            -e MONEYMAN_UNSAFE_STDOUT \
            ghcr.io/daniel-hauser/moneyman:latest

      - name: Build email HTML from transactions
        id: buildmail
        if: always()
        run: |
          LATEST=$(ls -t ${{ github.workspace }}/output/*.json 2>/dev/null | head -n1 || echo "")
          if [ -z "$LATEST" ]; then
            echo "tx_count=0" >> $GITHUB_OUTPUT
            echo "<p>No transactions generated.</p>" > email.html
            exit 0
          fi
          COUNT=$(jq 'length' "$LATEST")
          echo "tx_count=$COUNT" >> $GITHUB_OUTPUT
          {
            echo '<div dir="rtl" style="font-family:Arial,sans-serif;">'
            echo "<h3>תנועות בנק בינלאומי (פאג״י) חשבון 184993</h3>"
            echo "<p>סה״כ $COUNT תנועות (30 הימים האחרונים)</p>"
            echo '<table border="1" cellpadding="6" cellspacing="0" style="border-collapse:collapse;"><thead><tr style="background:#eee;"><th>תאריך</th><th>תיאור</th><th>סכום</th><th>סטטוס</th></tr></thead><tbody>'
            jq -r 'sort_by(.date)[] | [(.uniqueId | split("_")[0] | split("-") | "\(.[2])/\(.[1])/\(.[0])"), .description, .chargedAmount, .status] | "<tr><td>\(.[0])</td><td>\(.[1])</td><td style=\"color:\(if .[2] < 0 then "#c33" else "#393" end);font-weight:bold;text-align:left;\">\(if .[2] > 0 then "+" else "" end)\(.[2]) ₪</td><td>\(if .[3] == "pending" then "ממתינה" else "בוצעה" end)</td></tr>"' "$LATEST"
            echo '</tbody></table></div>'
          } > email.html

      - name: Send email with transactions
        if: always() && steps.buildmail.outputs.tx_count != '0'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "תנועות בנק בינלאומי (פאג״י) - חשבון 184993 - ${{ steps.buildmail.outputs.tx_count }} תנועות"
          to: t.marchum@gmail.com
          from: moneyman scraper <${{ secrets.MAIL_USERNAME }}>
          html_body: file://email.html
          convert_markdown: false

      - name: Push transactions to Supabase
        if: success()
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          BUILDING_ID: ${{ secrets.BUILDING_ID }}
          OUTPUT_DIR: ${{ github.workspace }}/output
        run: node push-to-supabase.mjs

      - name: Auto-match transactions
        if: success()
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          BUILDING_ID: ${{ secrets.BUILDING_ID }}
        run: |
          npm install @supabase/supabase-js --no-save
          node auto-match-all.js

      - name: Run managed agents (finance + collection)
        if: success()
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BUILDING_ID: ${{ secrets.BUILDING_ID }}
        run: node run-managed-agents.js

      - name: Upload transactions artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: transactions
          path: ${{ github.workspace }}/output/
          if-no-files-found: warn
