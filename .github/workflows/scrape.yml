name: Scrape
on:
  workflow_dispatch:
    inputs:
      DEBUG:
        description: "Debug logging namespace"
        required: false
        default: "moneyman:*"
jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - id: set-container-image
        run: echo "image=ghcr.io/daniel-hauser/moneyman:latest" >> $GITHUB_OUTPUT
      - name: Pull container image
        run: docker pull ${{ steps.set-container-image.outputs.image }}
      - name: Run scraper
        run: >
          docker run --rm
          -e MONEYMAN_CONFIG
          -e DEBUG
          -e TZ
          -e MONEYMAN_UNSAFE_STDOUT
          ${{ steps.set-container-image.outputs.image }}
        env:
          MONEYMAN_CONFIG: ${{ secrets.MONEYMAN_CONFIG }}
          DEBUG: ${{ github.event.inputs.DEBUG || 'moneyman:*' }}
          TZ: "Asia/Jerusalem"
          MONEYMAN_UNSAFE_STDOUT: "true"
