name: Scrape
on:
  workflow_dispatch:
  schedule:
    - cron: "5 10,22 * * *"

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Pull container image
        run: docker pull ghcr.io/daniel-hauser/moneyman:latest

      - name: Run dynamic scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FORCE_AGENTS: "true"
          TZ: "Asia/Jerusalem"
        run: node dynamic-scrape.mjs

      - name: Upload transactions artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: transactions
          path: ${{ github.workspace }}/output/
          if-no-files-found: warn
